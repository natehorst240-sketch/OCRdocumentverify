name: Build Windows installer

# Build the setup.exe in the cloud so you don't need a Windows machine.
# Run it from the Actions tab (Run workflow), or it runs automatically when you
# push a tag like v1.0.0. The finished installer is uploaded as an artifact you
# download from the run's summary page (and attached to the release on a tag).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to attach the installer to a release on tag builds

jobs:
  installer:
    runs-on: windows-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          # Don't leave the GITHUB_TOKEN in .git/config on the runner.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build the Go handwriting engine (handwriting.exe)
        shell: pwsh
        working-directory: handwriting   # the Go module lives here
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o ../handwriting.exe ./cmd/handwriting

      - name: Install Inno Setup (provides ISCC.exe)
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build the private Python runtime + the installer
        shell: cmd
        env:
          CI: "true"            # makes build_*.bat skip their interactive pauses
        run: build_installer.bat

      - name: Upload the installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AviationRecordsProcessor-Setup
          path: dist_installer/*.exe
          if-no-files-found: error

      - name: Attach installer to the release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist_installer/*.exe
